name: Deploy Production
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy"
        required: true
        default: "main"
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Capture commit
        id: meta
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Check backend syntax
        run: |
          node --check server.js
      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          RAW_KEY='${{ secrets.VPS_SSH_KEY }}'
          if printf "%s" "$RAW_KEY" | grep -q '\\n'; then
            printf "%b" "$RAW_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          else
            printf "%s" "$RAW_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          fi

          if ! grep -Eq 'BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY' ~/.ssh/id_ed25519; then
            echo "VPS_SSH_KEY is not a valid private key. Paste the private key file contents, not the .pub key."
            exit 1
          fi

          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - name: Ensure VPS app directory exists
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_APP_DIR }}'"
      - name: Upload production env file
        run: |
          RAW_ENV='${{ secrets.PORTAL_ENV_FILE }}'

          if [ -z "$RAW_ENV" ]; then
            echo "PORTAL_ENV_FILE secret is missing"
            exit 1
          fi

          ENV_FILE="$RUNNER_TEMP/cloud-connect.env"
          if printf "%s" "$RAW_ENV" | grep -q '\\n'; then
            printf "%b" "$RAW_ENV" | tr -d '\r' > "$ENV_FILE"
          else
            printf "%s" "$RAW_ENV" | tr -d '\r' > "$ENV_FILE"
          fi

          scp -P "${{ secrets.VPS_PORT }}" "$ENV_FILE" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/.env"
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "chmod 600 '${{ secrets.VPS_APP_DIR }}/.env'"
      - name: Sync repo to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude "database.sqlite" \
            --exclude "node_modules/" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"
      - name: Deploy on VPS
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail
          APP_DIR="${{ secrets.VPS_APP_DIR }}"
          DEPLOY_COMMIT="${{ steps.meta.outputs.commit }}"
          cd "$APP_DIR"
          npm ci --omit=dev
          if ! cmp -s "$APP_DIR/Caddyfile" /etc/caddy/Caddyfile; then
            sudo install -m 644 "$APP_DIR/Caddyfile" /etc/caddy/Caddyfile
            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
          fi
          if ! cmp -s "$APP_DIR/frps.toml" /etc/frp/frps.toml; then
            sudo install -m 644 "$APP_DIR/frps.toml" /etc/frp/frps.toml
            sudo systemctl restart frps
          fi

          if pm2 describe apex-portal >/dev/null 2>&1; then
            pm2 restart apex-portal
          elif pm2 describe server >/dev/null 2>&1; then
            pm2 delete server
            pm2 start server.js --name apex-portal
          else
            pm2 start server.js --name apex-portal
          fi

          if pm2 describe server >/dev/null 2>&1; then
            pm2 delete server
          fi

          printf "%s\n" "$DEPLOY_COMMIT" > "$APP_DIR/.deploy-version"
          pm2 save
          sudo systemctl is-active --quiet caddy
          sudo systemctl is-active --quiet frps
          pm2 describe apex-portal >/dev/null

          for attempt in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          pm2 logs apex-portal --lines 50 --nostream
          exit 1
          EOF
